<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Double Pendulum Simulator</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="stage" aria-label="Double pendulum physics simulator">
        <canvas id="simCanvas"></canvas>
      </section>

      <aside class="panel" aria-label="Simulation controls">
        <div class="brand">
          <span class="mark"></span>
          <div>
            <h1>Double Pendulum</h1>
            <p>Chaotic motion with live endpoint tracing.</p>
          </div>
        </div>

        <div class="metrics" aria-live="polite">
          <div>
            <span>Energy</span>
            <strong id="energyReadout">0.00</strong>
          </div>
          <div>
            <span>Trace</span>
            <strong id="traceReadout">0</strong>
          </div>
        </div>

        <div class="control-grid">
          <label>
            Randomness
            <input id="randomness" type="range" min="0" max="1.8" step="0.01" value="0.42">
          </label>
          <label>
            Gravity
            <input id="gravity" type="range" min="0.1" max="2.4" step="0.01" value="1">
          </label>
          <label>
            Trail length
            <input id="trailLength" type="range" min="80" max="1800" step="10" value="760">
          </label>
          <label>
            Damping
            <input id="damping" type="range" min="0.990" max="1.000" step="0.001" value="0.998">
          </label>
        </div>

        <div class="actions">
          <button id="toggleRun" type="button">Pause</button>
          <button id="shuffle" type="button">Shuffle</button>
          <button id="clearTrail" type="button">Clear trace</button>
        </div>
      </aside>
    </main>

    <script src="simulator.js"></script>
  </body>
</html>
