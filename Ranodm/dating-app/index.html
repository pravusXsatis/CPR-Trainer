<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PulseMatch</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <header class="topbar">
    <h1>PulseMatch</h1>
    <div id="authArea" class="auth-area">
      <button id="googleLoginBtn">Sign in with Google</button>
      <div id="userArea" class="hidden">
        <img id="userAvatar" alt="Your avatar" />
        <span id="userName"></span>
        <button id="logoutBtn" class="ghost">Log out</button>
      </div>
    </div>
  </header>

  <main class="layout">
    <section class="card">
      <h2>Your Profile</h2>
      <p class="sub">Create your profile so other people can discover you.</p>
      <form id="profileForm">
        <label>
          Display Name
          <input id="displayName" required maxlength="40" placeholder="Alex" />
        </label>

        <label>
          Bio
          <textarea id="bio" required maxlength="220" placeholder="Love coffee, coding, and long walks."></textarea>
        </label>

        <label>
          Age
          <input id="age" type="number" min="18" max="100" required />
        </label>

        <label>
          Upload Photo
          <input id="photoFile" type="file" accept="image/*" />
        </label>

        <button type="submit">Save Profile</button>
      </form>
      <p id="profileStatus" class="status"></p>
    </section>

    <section class="card">
      <h2>Discover</h2>
      <p class="sub">Like people and match when both of you like each other.</p>
      <div id="discoverList" class="list"></div>
    </section>

    <section class="card">
      <h2>Your Matches</h2>
      <p class="sub">People you and the other person both liked.</p>
      <div id="matchesList" class="list"></div>
    </section>
  </main>

  <footer class="footer">
    <small>Built with Firebase Auth, Firestore, and Storage.</small>
  </footer>

  <script type="module" src="./app.js"></script>
</body>
</html>
