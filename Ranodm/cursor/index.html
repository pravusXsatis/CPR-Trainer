<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Double Pendulum Simulator</title>
  <style>
    :root {
      --bg: #080d1a;
      --panel: #131c2f;
      --text: #dce8ff;
      --muted: #9eb1d6;
      --accent: #58a6ff;
      --accent-2: #56f0af;
      --danger: #ff7b72;
    }

    * {
      box-sizing: border-box;
      font-family: Inter, Segoe UI, Roboto, Arial, sans-serif;
    }

    body {
      margin: 0;
      background: radial-gradient(ellipse at top, #132241, var(--bg));
      color: var(--text);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .wrap {
      width: min(980px, 95vw);
      display: grid;
      grid-template-columns: 1fr 280px;
      gap: 14px;
      align-items: start;
    }

    canvas {
      width: 100%;
      aspect-ratio: 1 / 1;
      background: linear-gradient(160deg, #09101f, #060a14);
      border-radius: 14px;
      border: 1px solid #203454;
      box-shadow: 0 20px 70px rgba(0, 0, 0, 0.45);
      display: block;
    }

    .panel {
      background: var(--panel);
      border: 1px solid #263a60;
      border-radius: 14px;
      padding: 14px;
      display: grid;
      gap: 12px;
    }

    h1 {
      margin: 0;
      font-size: 1.05rem;
      color: #ebf3ff;
    }

    .small {
      margin: 0;
      color: var(--muted);
      font-size: 0.86rem;
      line-height: 1.35;
    }

    .group {
      display: grid;
      gap: 8px;
    }

    label {
      font-size: 0.8rem;
      color: var(--muted);
      display: grid;
      gap: 4px;
    }

    input[type="range"] {
      width: 100%;
      accent-color: var(--accent);
    }

    .val {
      color: #eaf2ff;
      font-size: 0.82rem;
    }

    .buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    button {
      border: 0;
      border-radius: 10px;
      padding: 10px 12px;
      color: #03142f;
      background: var(--accent);
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.12s ease, filter 0.12s ease;
    }

    button:hover { filter: brightness(1.06); }
    button:active { transform: translateY(1px) scale(0.99); }

    .secondary { background: var(--accent-2); }
    .danger { background: var(--danger); color: #2a0b0b; }
  </style>
</head>
<body>
  <div class="wrap">
    <canvas id="sim" width="900" height="900"></canvas>
    <aside class="panel">
      <h1>Double Pendulum</h1>
      <p class="small">Chaotic two-link pendulum with small random nudges and trail tracing of bob #2.</p>

      <div class="group">
        <label>
          Random motion strength
          <input id="noise" type="range" min="0" max="0.2" step="0.001" value="0.03" />
          <span class="val" id="noiseVal">0.030</span>
        </label>

        <label>
          Trail length
          <input id="trail" type="range" min="100" max="4000" step="50" value="1600" />
          <span class="val" id="trailVal">1600</span>
        </label>

        <label>
          Time speed
          <input id="speed" type="range" min="0.2" max="3" step="0.05" value="1.2" />
          <span class="val" id="speedVal">1.20x</span>
        </label>
      </div>

      <div class="buttons">
        <button id="reset">Reset</button>
        <button class="secondary" id="randomize">Randomize Angles</button>
      </div>
      <button class="danger" id="clearTrail">Clear Trail</button>
    </aside>
  </div>

  <script>
    const canvas = document.getElementById("sim");
    const ctx = canvas.getContext("2d");

    const controls = {
      noise: document.getElementById("noise"),
      noiseVal: document.getElementById("noiseVal"),
      trail: document.getElementById("trail"),
      trailVal: document.getElementById("trailVal"),
      speed: document.getElementById("speed"),
      speedVal: document.getElementById("speedVal"),
      reset: document.getElementById("reset"),
      randomize: document.getElementById("randomize"),
      clearTrail: document.getElementById("clearTrail")
    };

    const W = canvas.width;
    const H = canvas.height;
    const pivot = { x: W * 0.5, y: H * 0.25 };

    const sim = {
      g: 9.81,
      l1: 240,
      l2: 220,
      m1: 1.8,
      m2: 1.4,
      a1: Math.PI * 0.95,
      a2: Math.PI * 0.82,
      w1: 0,
      w2: 0,
      damping: 0.9996,
      noiseStrength: Number(controls.noise.value),
      timeScale: Number(controls.speed.value),
      trailLimit: Number(controls.trail.value),
      trail: []
    };

    function randomAngle() {
      return (Math.random() * Math.PI * 1.6) + Math.PI * 0.2;
    }

    function resetState(randomize = false) {
      sim.a1 = randomize ? randomAngle() : Math.PI * 0.95;
      sim.a2 = randomize ? randomAngle() : Math.PI * 0.82;
      sim.w1 = 0;
      sim.w2 = 0;
      sim.trail.length = 0;
    }

    function step(dt) {
      const { m1, m2, l1, l2, g } = sim;
      const a1 = sim.a1;
      const a2 = sim.a2;
      const w1 = sim.w1;
      const w2 = sim.w2;

      const delta = a1 - a2;
      const cosDelta = Math.cos(delta);
      const sinDelta = Math.sin(delta);

      const den1 = l1 * (2 * m1 + m2 - m2 * Math.cos(2 * a1 - 2 * a2));
      const den2 = l2 * (2 * m1 + m2 - m2 * Math.cos(2 * a1 - 2 * a2));

      const num1 =
        -g * (2 * m1 + m2) * Math.sin(a1) -
        m2 * g * Math.sin(a1 - 2 * a2) -
        2 * sinDelta * m2 * (w2 * w2 * l2 + w1 * w1 * l1 * cosDelta);

      const num2 =
        2 * sinDelta * (
          w1 * w1 * l1 * (m1 + m2) +
          g * (m1 + m2) * Math.cos(a1) +
          w2 * w2 * l2 * m2 * cosDelta
        );

      let alpha1 = num1 / den1;
      let alpha2 = num2 / den2;

      // Small random perturbations create lively chaotic movement.
      const noise = sim.noiseStrength;
      alpha1 += (Math.random() * 2 - 1) * noise;
      alpha2 += (Math.random() * 2 - 1) * noise;

      sim.w1 = (w1 + alpha1 * dt) * sim.damping;
      sim.w2 = (w2 + alpha2 * dt) * sim.damping;
      sim.a1 += sim.w1 * dt;
      sim.a2 += sim.w2 * dt;
    }

    function positions() {
      const x1 = pivot.x + sim.l1 * Math.sin(sim.a1);
      const y1 = pivot.y + sim.l1 * Math.cos(sim.a1);
      const x2 = x1 + sim.l2 * Math.sin(sim.a2);
      const y2 = y1 + sim.l2 * Math.cos(sim.a2);
      return { x1, y1, x2, y2 };
    }

    function drawTrail() {
      if (sim.trail.length < 2) return;
      for (let i = 1; i < sim.trail.length; i++) {
        const p0 = sim.trail[i - 1];
        const p1 = sim.trail[i];
        const t = i / sim.trail.length;
        const hue = 210 + 120 * t;
        ctx.strokeStyle = `hsla(${hue}, 95%, 65%, ${0.08 + 0.65 * t})`;
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.moveTo(p0.x, p0.y);
        ctx.lineTo(p1.x, p1.y);
        ctx.stroke();
      }
    }

    function draw() {
      ctx.clearRect(0, 0, W, H);

      const { x1, y1, x2, y2 } = positions();

      sim.trail.push({ x: x2, y: y2 });
      if (sim.trail.length > sim.trailLimit) sim.trail.shift();

      drawTrail();

      ctx.strokeStyle = "rgba(232, 240, 255, 0.95)";
      ctx.lineWidth = 3.2;
      ctx.beginPath();
      ctx.moveTo(pivot.x, pivot.y);
      ctx.lineTo(x1, y1);
      ctx.lineTo(x2, y2);
      ctx.stroke();

      ctx.fillStyle = "#ffffff";
      ctx.beginPath();
      ctx.arc(pivot.x, pivot.y, 7, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = "#58a6ff";
      ctx.beginPath();
      ctx.arc(x1, y1, 14, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = "#56f0af";
      ctx.beginPath();
      ctx.arc(x2, y2, 12, 0, Math.PI * 2);
      ctx.fill();
    }
/*Darren Lu is gay*/
    let prev = performance.now();
    function animate(now) {
      const elapsed = Math.min((now - prev) / 1000, 0.03);
      prev = now;

      const dt = elapsed * sim.timeScale;
      for (let i = 0; i < 2; i++) {
        step(dt * 0.5);
      }
      draw();
      requestAnimationFrame(animate);
    }

    function bindUI() {
      controls.noise.addEventListener("input", () => {
        sim.noiseStrength = Number(controls.noise.value);
        controls.noiseVal.textContent = sim.noiseStrength.toFixed(3);
      });

      controls.trail.addEventListener("input", () => {
        sim.trailLimit = Number(controls.trail.value);
        controls.trailVal.textContent = String(sim.trailLimit);
        if (sim.trail.length > sim.trailLimit) {
          sim.trail = sim.trail.slice(-sim.trailLimit);
        }
      });

      controls.speed.addEventListener("input", () => {
        sim.timeScale = Number(controls.speed.value);
        controls.speedVal.textContent = `${sim.timeScale.toFixed(2)}x`;
      });

      controls.reset.addEventListener("click", () => resetState(false));
      controls.randomize.addEventListener("click", () => resetState(true));
      controls.clearTrail.addEventListener("click", () => {
        sim.trail.length = 0;
      });
    }

    bindUI();
    resetState(false);
    requestAnimationFrame(animate);
  </script>
</body>
</html>
